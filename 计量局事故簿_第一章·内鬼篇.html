<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>计量局事故簿 · 第一章 · 内鬼篇</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=ZCOOL+KuaiLe&display=swap');
:root{
  --ink:#241f2e;--paper:#f3ead6;--paper2:#e7d9bb;--rose:#c84a63;--rose2:#92293f;
  --gold:#bf9233;--teal:#33756a;--line:#c8b690;--sh:rgba(50,35,25,.22);--blue:#3a5a8c;
  --mole:#5b2a86;--mole2:#3a1857;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif SC',serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(circle at 15% 5%,rgba(200,74,99,.10),transparent 42%),
             radial-gradient(circle at 85% 90%,rgba(91,42,134,.12),transparent 45%),var(--paper);
  display:flex;justify-content:center;padding:18px 10px 70px;}
.wrap{width:100%;max-width:720px;}
.title{text-align:center;margin-bottom:12px;}
.title h1{font-family:'ZCOOL KuaiLe';font-size:28px;color:var(--rose2);text-shadow:2px 2px 0 var(--paper2);}
.title p{font-size:11px;color:var(--teal);letter-spacing:3px;margin-top:2px;}
.scr{background:linear-gradient(180deg,#fffaef,#f1e6cd);border:2px solid var(--line);border-radius:16px;
  box-shadow:0 14px 38px var(--sh),inset 0 0 0 5px rgba(255,255,255,.4);padding:20px 18px;position:relative;overflow:hidden;}
.scr::after{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--mole));}

.hud{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.hud .ch{font-family:'ZCOOL KuaiLe';color:var(--rose2);font-size:15px;}
.tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11.5px;background:var(--paper2);border:1px solid var(--line);border-radius:18px;padding:3px 10px;white-space:nowrap;}
.tag b{color:var(--rose2);}
.tag.cl{cursor:pointer;}
.tag.cl:hover{background:#fdeccb;}
.tag.ml{background:#efe4f7;border-color:#c9aee5;}
.tag.ml b{color:var(--mole);}

.narr{background:rgba(255,255,255,.5);border:1px dashed var(--line);border-radius:10px;
  padding:12px 14px;font-size:14px;line-height:1.75;margin-bottom:12px;animation:fade .4s;}
.narr .loc{font-size:12px;color:var(--teal);font-style:italic;display:block;margin-bottom:5px;}
.narr.big{text-align:center;}

@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes pop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.06);}100%{transform:scale(1);opacity:1;}}
.line{display:flex;gap:9px;margin-bottom:9px;align-items:flex-start;animation:fade .4s;}
.av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 7px var(--sh);}
.bu{background:linear-gradient(135deg,#46466a,#241f2e);}
.ri{background:linear-gradient(135deg,#dd86a0,#c84a63);}
.xue{background:linear-gradient(135deg,#7bb6a8,#33756a);}
.mi{background:linear-gradient(135deg,#e6c267,#bf9233);}
.npc{background:linear-gradient(135deg,#9a8fb0,#6a5f82);}
.jia{background:linear-gradient(135deg,#7d4bb0,#3a1857);}
.sys{background:#1c1c28;}
.bb{background:#fff;border:1px solid var(--line);border-radius:13px;padding:9px 13px;font-size:14px;line-height:1.62;flex:1;box-shadow:0 2px 5px rgba(0,0,0,.05);}
.bb .w{display:block;font-size:11px;color:var(--rose2);font-weight:700;margin-bottom:2px;letter-spacing:1px;}
.bb.s{background:#1c1c28;color:#f3ead6;border-color:#1c1c28;font-size:13.5px;}
.bb.s .w{color:var(--gold);}
.bb.m{background:#241433;color:#f0e6fb;border-color:#3a1857;}
.bb.m .w{color:#c9aee5;}

.evid{background:linear-gradient(180deg,#fff8ea,#fdeccb);border:1px solid var(--gold);border-left:5px solid var(--gold);
  border-radius:8px;padding:10px 13px;margin:9px 0;font-size:13.5px;line-height:1.68;animation:fade .4s;}
.evid .et{font-family:'ZCOOL KuaiLe';color:#7a5a14;font-size:14px;display:block;margin-bottom:4px;}
.evid table{width:100%;border-collapse:collapse;margin-top:5px;font-size:13px;}
.evid td{border:1px solid #d9c187;padding:4px 8px;vertical-align:top;}
.evid td:first-child{background:#fbeecb;font-weight:500;width:40%;}

.molecard{background:linear-gradient(180deg,#efe4f7,#e2cff3);border:1px solid #c9aee5;border-left:5px solid var(--mole);
  border-radius:8px;padding:10px 13px;margin:9px 0;font-size:13.5px;line-height:1.68;animation:pop .4s;}
.molecard .et{font-family:'ZCOOL KuaiLe';color:var(--mole2);font-size:14px;display:block;margin-bottom:4px;}
.molecard table{width:100%;border-collapse:collapse;margin-top:5px;font-size:13px;}
.molecard td{border:1px solid #c9aee5;padding:4px 8px;}
.molecard td:first-child{background:#e7d6f5;font-weight:500;width:40%;}

.invt{font-size:13px;color:var(--teal);margin:7px 0 8px;font-weight:500;}
.acts{display:flex;flex-direction:column;gap:8px;}
.act{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink);transition:.15s;line-height:1.5;}
.act:hover{border-color:var(--teal);background:#eef6f3;transform:translateX(3px);}
.act.used{opacity:.5;cursor:default;border-style:dashed;}
.act .ai{color:var(--teal);font-size:12px;}

.dec{background:rgba(255,255,255,.7);border:2px solid var(--rose);border-radius:13px;padding:14px;margin-top:10px;animation:fade .4s;}
.dec .dh{font-weight:700;color:var(--rose2);margin-bottom:11px;font-size:15px;line-height:1.5;}
.opt{text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 13px;font-size:14px;cursor:pointer;font-family:inherit;color:var(--ink);transition:.15s;width:100%;margin-bottom:8px;line-height:1.55;}
.opt:hover{border-color:var(--rose);background:#fdf1f3;transform:translateX(3px);}
.opt:disabled{cursor:default;}
.opt.ok{background:#e3f3ec;border-color:var(--teal);color:var(--teal);font-weight:600;}
.opt.no{background:#fbe3e8;border-color:var(--rose);color:var(--rose2);}
.opt.dim{opacity:.4;}

.fitb{background:#f7f1e2;border:1px dashed var(--teal);border-radius:10px;padding:13px;margin:10px 0;font-size:14px;line-height:2.1;}
.fitb .fq{font-weight:600;color:#1f5249;margin-bottom:8px;line-height:1.6;}
.fitb input{font-family:inherit;font-size:15px;width:96px;padding:4px 7px;border:1.5px solid var(--line);border-radius:7px;margin:0 3px;text-align:center;background:#fff;}
.fitb input.okk{border-color:var(--teal);background:#e3f3ec;}
.fitb input.noo{border-color:var(--rose);background:#fbe3e8;}
.fitb .cbtn{background:var(--teal);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-family:inherit;cursor:pointer;font-size:14px;margin-top:6px;}
.fitb .cbtn:hover{filter:brightness(1.08);}

.sortg{background:#f3eeff;border:1px dashed var(--mole);border-radius:10px;padding:13px;margin:10px 0;}
.sortg .sq{font-weight:600;color:var(--mole2);margin-bottom:6px;font-size:14px;line-height:1.6;}
.sortg .hint{font-size:12px;color:#7a6a8a;margin-bottom:10px;}
.sitem{background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:8px 11px;margin-bottom:8px;font-size:13.5px;}
.sitem .stext{margin-bottom:6px;line-height:1.5;}
.sitem .scats{display:flex;gap:6px;flex-wrap:wrap;}
.scat{font-size:12px;background:#f0eafa;border:1px solid #cbb6e6;border-radius:14px;padding:4px 11px;cursor:pointer;font-family:inherit;color:#4a3666;}
.scat:hover{background:#e3d4f5;}
.scat.sel{background:var(--mole);color:#fff;border-color:var(--mole);}
.sitem.right{border-color:var(--teal);background:#e9f6f1;}
.sitem.wrong{border-color:var(--rose);background:#fdeef1;}
.sortg .cbtn{background:var(--mole);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-family:inherit;cursor:pointer;font-size:14px;margin-top:4px;}
.sortg .cbtn:disabled{opacity:.4;cursor:default;}

.hunt{background:#fffaf0;border:1px solid var(--gold);border-radius:10px;padding:14px;margin:10px 0;}
.hunt .hq{font-weight:600;color:#7a5a14;margin-bottom:4px;font-size:14px;}
.hunt .hint{font-size:12px;color:#8a7a60;margin-bottom:10px;}
.huntdoc{background:#fff;border:1px solid #e3d2a8;border-radius:8px;padding:13px 15px;font-size:14px;line-height:2.05;}
.hw{cursor:pointer;border-radius:4px;padding:1px 3px;border-bottom:2px dotted #c8b690;transition:.12s;}
.hw:hover{background:#fdeccb;}
.hw.mark{background:#fbe3e8;border-bottom:2px solid var(--rose);color:var(--rose2);font-weight:600;}
.hw.hit{background:#e3f3ec;border-bottom:2px solid var(--teal);color:#1f5249;font-weight:600;}
.hw.miss{background:#fff3cc;border-bottom:2px solid var(--gold);}
.hunt .cbtn{background:var(--gold);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-family:inherit;cursor:pointer;font-size:14px;margin-top:10px;}
.whybox{font-size:12.5px;color:#6a4a14;margin-top:9px;line-height:1.7;}
.whybox .wi{display:block;margin-bottom:3px;}

.boom{background:linear-gradient(180deg,#fff0f3,#ffe1e8);border:2px solid var(--rose);border-radius:13px;padding:14px;margin-top:10px;animation:pop .4s;}
.boom .bh{font-family:'ZCOOL KuaiLe';color:var(--rose2);font-size:15px;margin-bottom:8px;}

.res{margin-top:12px;padding:13px 15px;border-radius:10px;font-size:14px;line-height:1.7;animation:fade .35s;}
.res.g{background:#e3f3ec;border:1px solid var(--teal);color:#1f5249;}
.res.b{background:#fbe3e8;border:1px solid var(--rose);color:var(--rose2);}
.res.n{background:#eef1f7;border:1px solid var(--blue);color:#2c4a78;}
.res.m{background:#efe4f7;border:1px solid var(--mole);color:var(--mole2);}
.res .rt{font-weight:700;display:block;margin-bottom:4px;}

.kp{background:linear-gradient(180deg,#fff6e6,#ffeac6);border-left:4px solid var(--gold);border-radius:6px;padding:10px 13px;margin-top:10px;font-size:13px;line-height:1.7;color:#684c12;}
.kp b{color:var(--rose2);}

.btn{margin-top:13px;width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--rose),var(--rose2));color:#fff;font-family:'ZCOOL KuaiLe';font-size:16px;letter-spacing:2px;cursor:pointer;box-shadow:0 6px 15px rgba(146,41,63,.4);transition:transform .12s;}
.btn:hover{transform:translateY(-2px);}
.btn.ghost{background:var(--paper2);color:var(--ink);box-shadow:none;border:1px solid var(--line);}
.btn.teal{background:linear-gradient(135deg,#4a9587,var(--teal));box-shadow:0 6px 15px rgba(51,117,106,.4);}
.btn.mole{background:linear-gradient(135deg,#7d4bb0,var(--mole2));box-shadow:0 6px 15px rgba(58,24,87,.4);}

.startc{text-align:center;}
.startc .em{font-size:48px;}
.startc h2{font-family:'ZCOOL KuaiLe';color:var(--rose2);font-size:22px;margin:6px 0;}
.startc p{font-size:13.5px;line-height:1.85;color:#5a4a36;margin:9px 4px;}
.cast{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0;}
.cast .c{font-size:11.5px;background:var(--paper2);border:1px solid var(--line);border-radius:10px;padding:7px 9px;width:150px;text-align:left;}
.cast .c .e{font-size:20px;}
.note{font-size:12px;color:#8a7a60;margin-top:12px;font-style:italic;line-height:1.6;}

.casebar{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0;justify-content:center;}
.casebar .dot{width:11px;height:11px;border-radius:50%;background:var(--paper2);border:1px solid var(--line);}
.casebar .dot.done{background:var(--teal);}
.casebar .dot.now{background:var(--rose);box-shadow:0 0 0 3px rgba(200,74,99,.25);}

.modal{position:fixed;inset:0;background:rgba(30,20,25,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade .25s;}
.modal .box{background:var(--paper);border:2px solid var(--gold);border-radius:14px;max-width:460px;width:100%;max-height:82vh;overflow:auto;padding:18px;}
.modal h3{font-family:'ZCOOL KuaiLe';color:var(--rose2);margin-bottom:8px;}
.modal .ev2{font-size:13px;border-bottom:1px dashed var(--line);padding:8px 0;line-height:1.6;}
.modal .cx{float:right;cursor:pointer;font-size:18px;color:var(--rose2);}
.modal .box.m{border-color:var(--mole);}
</style>
</head>
<body>
<div class="wrap">
  <div class="title"><h1>计量局事故簿</h1><p>第一章 · 内鬼篇 · 影子检定站连环案</p></div>
  <div class="scr" id="scr"></div>
</div>
<script>
/* ===== 全局状态 ===== */
const G={fav:0,rep:0,clues:[],mole:[],flags:{},caseIdx:0,badEndings:[],boomQueue:[],mastered:{}};
const TOTAL_CASES=9;
const CAST=[
  {e:"🕴️",n:"沈准",d:"高冷话痨部长，开口必带恋爱比喻；与你联手追查内鬼"},
  {e:"💋",n:"白偏差",d:"傲娇竞争对手，爱抢功挖坑——似乎被人当了枪使"},
  {e:"🍵",n:"温溯源",d:"温柔学长，关键时刻递线索与真相"},
  {e:"🎀",n:"陆量值",d:"咋呼闺蜜，负责复述口诀、突击抽查你"},
  {e:"🟣",n:"贾印证",d:"？？？——名字像句谶语。每桩案子背后都有他的影子"},
];
const AV={bu:'🕴️',ri:'💋',xue:'🍵',mi:'🎀',npc:'👤',jia:'🟣',sys:'📋'};
const scr=document.getElementById('scr');

/* ===== 渲染原子 ===== */
function line(av,who,t){return `<div class="line"><div class="av ${av}">${AV[av]||'❓'}</div><div class="bb ${av==='sys'?'s':''}${av==='jia'?' m':''}"><span class="w">${who}</span>${t}</div></div>`;}
function narr(loc,t,big){return `<div class="narr ${big?'big':''}">${loc?`<span class="loc">📍 ${loc}</span>`:''}${t}</div>`;}
function evid(title,body){return `<div class="evid"><span class="et">${title}</span>${body}</div>`;}
function molecard(title,body){return `<div class="molecard"><span class="et">🕸️ ${title}</span>${body}</div>`;}
function kp(t){return `<div class="kp">${t}</div>`;}

function hud(chap){
  return `<div class="hud"><span class="ch">${chap}</span><div class="tags">
    <span class="tag">💗 好感 ${G.fav>=0?'+':''}${G.fav}</span>
    <span class="tag">⭐ 声望 ${G.rep}</span>
    <span class="tag cl" onclick="openClues()">🗂️ 线索 <b>${G.clues.length}</b></span>
    <span class="tag cl ml" onclick="openMole()">🕸️ 证据墙 <b>${G.mole.length}</b></span>
    </div></div>`;
}
function casebar(){let d='';for(let i=0;i<TOTAL_CASES;i++){d+=`<span class="dot ${i<G.caseIdx?'done':i===G.caseIdx?'now':''}"></span>`;}return `<div class="casebar">${d}</div>`;}

/* ===== 线索本 / 证据墙 ===== */
const CLUE_LIB={};const MOLE_LIB={};
function addClue(id){if(!G.clues.includes(id))G.clues.push(id);}
function addMole(id){if(!G.mole.includes(id))G.mole.push(id);}
function openClues(){
  let it=G.clues.length?G.clues.map(id=>{const c=CLUE_LIB[id];return c?`<div class="ev2"><b style="color:#7a5a14">${c.t}</b><br>${c.body}</div>`:'';}).join(''):'<p style="font-size:13px;color:#8a7a60">还没收集到线索。多调查、多翻规定就会攒下来。</p>';
  popup('🗂️ 线索本 · 你掌握的条文',it,false);
}
function openMole(){
  let it=G.mole.length?G.mole.map(id=>{const c=MOLE_LIB[id];return c?`<div class="ev2"><b style="color:#5b2a86">🕸️ ${c.t}</b><br>${c.body}</div>`:'';}).join(''):'<p style="font-size:13px;color:#8a7a60">证据墙空着。沿主线调查，造假的破绽会一条条钉上来。</p>';
  popup('🕸️ 证据墙 · 影子检定站',it+`<p style="font-size:12px;color:#7a6a8a;margin-top:10px">凑齐线索，终章才能当面钉死贾印证。已钉 <b>${G.mole.length}</b> 块。</p>`,true);
}
function popup(title,inner,mole){
  const m=document.createElement('div');m.className='modal';m.id='pm';
  m.innerHTML=`<div class="box ${mole?'m':''}"><span class="cx" onclick="document.getElementById('pm').remove()">✕</span><h3>${title}</h3>${inner}</div>`;
  m.onclick=e=>{if(e.target===m)m.remove();};document.body.appendChild(m);
}

/* ===== 数值 / 旗标 ===== */
function fxFav(d){G.fav+=d;}function fxRep(d){G.rep+=d;}
function setFlag(k,v){G.flags[k]=(v===undefined?true:v);}function flag(k){return !!G.flags[k];}

/* ===== 错题回旋镖 ===== */
const BOOM_LIB={};
function recordWrong(id){if(!id||!BOOM_LIB[id]||G.mastered[id])return;if(!G.boomQueue.includes(id))G.boomQueue.push(id);}
function clearWrong(id){G.boomQueue=G.boomQueue.filter(x=>x!==id);}

/* ===== 调查取证 ===== */
function investigate(container,items,contLabel,contFn,minClues){
  let html=`<div class="invt">🔍 ${items.intro||'动笔前，先调查取证：'}</div><div class="acts" id="actbox">`;
  items.acts.forEach((a,i)=>{html+=`<button class="act" onclick="window.__inv(${i})">${a.label}${a.hint?` <span class="ai">（${a.hint}）</span>`:''}</button>`;});
  html+=`</div><div id="invdyn"></div>`;
  container.insertAdjacentHTML('beforeend',html);
  let got=0;
  window.__inv=function(i){
    const btns=document.querySelectorAll('#actbox .act');
    if(btns[i].classList.contains('used'))return;
    btns[i].classList.add('used');
    const a=items.acts[i];
    if(a.clue)addClue(a.clue);if(a.mole)addMole(a.mole);
    document.getElementById('invdyn').insertAdjacentHTML('beforeend',a.reveal);
    got++;
    if(got>=(minClues||1)&&!document.getElementById('contbtn')){
      document.getElementById('invdyn').insertAdjacentHTML('beforeend',`<button class="btn" id="contbtn" onclick="(${contFn.name})()">${contLabel} →</button>`);
    }
  };
}

/* ===== 决策 ===== */
function decideTo(container,head,opts,conceptId){
  const did='dec_'+Math.random().toString(36).slice(2,7);
  let html=`<div class="dec" id="${did}"><div class="dh">⚖️ ${head}</div>`;
  opts.forEach((o,i)=>{html+=`<button class="opt" onclick="window.__dec2(${i})">${o.t}</button>`;});
  html+=`</div><div id="${did}_res"></div>`;
  container.insertAdjacentHTML('beforeend',html);
  const decEl=document.getElementById(did),resEl=document.getElementById(did+'_res');
  window.__decres=resEl;
  window.__dec2=function(i){
    decEl.querySelectorAll('.opt').forEach((b,j)=>{b.disabled=true;
      if(opts[j].ok)b.classList.add('ok');if(j===i&&!opts[i].ok)b.classList.add('no');if(!opts[j].ok&&j!==i)b.classList.add('dim');});
    const o=opts[i];
    if(o.fav)fxFav(o.fav);if(o.rep)fxRep(o.rep);if(o.flag)setFlag(o.flag);if(o.bad)G.badEndings.push(o.bad);
    if(conceptId){if(o.ok)clearWrong(conceptId);else recordWrong(conceptId);}
    resEl.innerHTML=`<div class="res ${o.ok?'g':'b'}">${o.res}</div>`+(o.kp?kp(o.kp):'');
    o.then();
  };
}
function retryBtn(fn){(window.__decres||document.getElementById('scr')).insertAdjacentHTML('beforeend',`<button class="btn ghost" onclick="(${fn.name})()">↺ 重新判断这一步</button>`);}

/* ===== 玩法①：输入作答 ===== */
function normalize(s){
  if(s==null)return '';
  s=(''+s).trim().toLowerCase();
  s=s.replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0)).replace(/[Ａ-Ｚａ-ｚ]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xfee0));
  s=s.replace(/[\s，,。、；;：:《》""''（）()]/g,'');
  return s;
}
function fillIn(container,opts){
  let tpl=opts.template.replace(/\{(\d+)\}/g,(m,n)=>`<input id="fb_${n}" autocomplete="off" placeholder="?">`);
  container.insertAdjacentHTML('beforeend',
    `<div class="fitb"><div class="fq">✍️ ${opts.q}</div>${tpl}<div><button class="cbtn" onclick="window.__fitb()">提交作答</button></div><div id="fbres"></div></div>`);
  window.__fitb=function(){
    let allok=true;
    opts.blanks.forEach((b,i)=>{
      const el=document.getElementById('fb_'+i);if(!el)return;
      const v=normalize(el.value);
      const ok=v!==''&&b.accept.some(a=>normalize(a)===v);
      el.classList.remove('okk','noo');el.classList.add(ok?'okk':'noo');
      if(!ok)allok=false;
    });
    const r=document.getElementById('fbres');
    if(allok){
      if(opts.conceptId)clearWrong(opts.conceptId);
      r.innerHTML=`<div class="res g" style="margin-top:9px"><span class="rt">✅ 全对，自己默出来的才记得牢</span>${opts.okText||''}</div>`+(opts.kp?kp(opts.kp):'');
      opts.pass();
    }else{
      if(opts.conceptId)recordWrong(opts.conceptId);
      r.innerHTML=`<div class="res b" style="margin-top:9px"><span class="rt">❌ 还有空没对</span>${opts.hint||'红框的再想想，可翻线索本。'}</div>`;
    }
  };
}

/* ===== 玩法②：归类（点选式） ===== */
function sortGame(container,opts){
  const gid='sg_'+Math.random().toString(36).slice(2,7);
  let html=`<div class="sortg" id="${gid}"><div class="sq">🗂️ ${opts.q}</div>${opts.hint?`<div class="hint">${opts.hint}</div>`:''}`;
  opts.items.forEach((it,i)=>{
    html+=`<div class="sitem" id="${gid}_it${i}"><div class="stext">${it.t}</div><div class="scats">`;
    opts.cats.forEach(c=>{html+=`<button class="scat" onclick="window.__sgPick(${i},'${c.id}')" data-it="${i}" data-cat="${c.id}">${c.label}</button>`;});
    html+=`</div></div>`;
  });
  html+=`<button class="cbtn" id="${gid}_chk" disabled onclick="window.__sgChk()">对答案</button><div id="${gid}_res"></div></div>`;
  container.insertAdjacentHTML('beforeend',html);
  const assign={};
  window.__sgPick=function(i,cat){
    if(document.getElementById(gid+'_it'+i).classList.contains('right'))return;
    assign[i]=cat;
    document.querySelectorAll('.scat[data-it="'+i+'"]').forEach(b=>b.classList.toggle('sel',b.dataset.cat===cat));
    if(Object.keys(assign).length===opts.items.length)document.getElementById(gid+'_chk').disabled=false;
  };
  window.__sgChk=function(){
    let allok=true;
    opts.items.forEach((it,i)=>{
      const el=document.getElementById(gid+'_it'+i);
      if(el.classList.contains('right'))return;
      if(assign[i]===it.cat){el.classList.remove('wrong');el.classList.add('right');el.querySelectorAll('.scat').forEach(b=>b.disabled=true);}
      else{el.classList.add('wrong');allok=false;el.querySelectorAll('.scat').forEach(b=>b.classList.remove('sel'));delete assign[i];}
    });
    const r=document.getElementById(gid+'_res');
    if(allok){
      if(opts.conceptId)clearWrong(opts.conceptId);
      document.getElementById(gid+'_chk').style.display='none';
      r.innerHTML=`<div class="res g" style="margin-top:9px"><span class="rt">✅ 全部归类正确</span>${opts.okText||''}</div>`+(opts.kp?kp(opts.kp):'');
      opts.pass();
    }else{
      if(opts.conceptId)recordWrong(opts.conceptId);
      document.getElementById(gid+'_chk').disabled=true;
      r.innerHTML=`<div class="res b" style="margin-top:9px"><span class="rt">❌ 红色的归错了</span>它们已清空，重新归类再对一次。</div>`;
    }
  };
}

/* ===== 玩法③：文书找茬 ===== */
function huntGame(container,opts){
  const hid='hg_'+Math.random().toString(36).slice(2,7);
  let doc='';
  opts.segs.forEach((s,i)=>{doc+=`<span class="hw" id="${hid}_s${i}" onclick="window.__hMark(${i})">${s.t}</span>`;});
  container.insertAdjacentHTML('beforeend',
    `<div class="hunt" id="${hid}"><div class="hq">🔎 ${opts.q}</div><div class="hint">${opts.hint||'点出你认为有问题的字句（可多处），再提交。'}</div><div class="huntdoc">${doc}</div><button class="cbtn" onclick="window.__hSubmit()">提交圈定</button><div id="${hid}_res"></div></div>`);
  let marked=new Set();
  window.__hMark=function(i){
    const el=document.getElementById(hid+'_s'+i);
    if(el.classList.contains('locked'))return;
    if(marked.has(i)){marked.delete(i);el.classList.remove('mark');}else{marked.add(i);el.classList.add('mark');}
  };
  window.__hSubmit=function(){
    let perfect=true,why='';
    opts.segs.forEach((s,i)=>{
      const el=document.getElementById(hid+'_s'+i);el.classList.add('locked');
      const m=marked.has(i);
      if(s.bad&&m){el.classList.remove('mark');el.classList.add('hit');why+=`<span class="wi">✅ 「${s.t.trim()}」——${s.why}</span>`;}
      else if(s.bad&&!m){el.classList.add('miss');perfect=false;why+=`<span class="wi">⚠️ 漏了「${s.t.trim()}」——${s.why}</span>`;}
      else if(!s.bad&&m){el.classList.add('miss');perfect=false;why+=`<span class="wi">❌ 「${s.t.trim()}」其实没问题，误圈了。</span>`;}
    });
    const r=document.getElementById(hid+'_res');
    if(perfect){
      if(opts.conceptId)clearWrong(opts.conceptId);
      r.innerHTML=`<div class="res g" style="margin-top:9px"><span class="rt">✅ 火眼金睛，全部命中</span><div class="whybox">${why}</div></div>`+(opts.kp?kp(opts.kp):'');
      opts.pass();
    }else{
      if(opts.conceptId)recordWrong(opts.conceptId);
      opts.segs.forEach((s,i)=>{const el=document.getElementById(hid+'_s'+i);el.classList.remove('locked','hit','miss','mark');});
      marked.clear();
      r.innerHTML=`<div class="res b" style="margin-top:9px"><span class="rt">❌ 没全中</span><div class="whybox">${why}</div></div><button class="btn ghost" onclick="document.getElementById('${hid}_res').innerHTML=''">↺ 看明白了，再圈一次</button>`;
    }
  };
}

/* ===== 调度 ===== */
const CASES=[];
function nextCase(){
  if(G.boomQueue.length){runBoomerang();return;}
  if(G.caseIdx>=CASES.length){grandFinale();return;}
  CASES[G.caseIdx]();
}
function finishCase(){
  G.caseIdx++;
  scr.innerHTML=hud("—— 案件归档 ——")+casebar()+
    narr("","<div style='text-align:center;font-size:38px'>🗂️</div><div style='text-align:center'>本案归档。卷宗放进沈准桌上那摞越来越高的文件里——其中一页，被他悄悄抽出来夹进了另一个牛皮纸袋。<br>"+
    (G.caseIdx<CASES.length?"下一桩事故，已经在路上了。":"全部事故处理完毕。")+"</div>",true)+
    `<button class="btn" onclick="nextCase()">${G.caseIdx<CASES.length?'接手下一桩 →':'摊牌，钉死内鬼 →'}</button>`;
}

/* ===== 回旋镖突击 ===== */
function runBoomerang(){
  const id=G.boomQueue[0];const b=BOOM_LIB[id];
  if(!b){G.boomQueue.shift();nextCase();return;}
  const w=Math.random()<.5?['mi','陆量值','唉我突击抽查你！上次你这题错了，这次必须答对哦～']:['ri','白偏差','新人，上次你在这儿翻过车。还记得正解吗？答错可别怪我看笑话。'];
  scr.innerHTML=hud("⚡ 突击抽查")+casebar()+
    narr("茶水间 · 路过","刚要去下一桩，被截住——上次这个点你判错过，正好再考你一次。")+line(w[0],w[1],w[2]);
  let html=`<div class="boom"><div class="bh">🎯 错题回旋镖：${b.q}</div>`;
  b.opts.forEach((o,i)=>{html+=`<button class="opt" onclick="window.__boom(${i})">${o.t}</button>`;});
  html+=`</div><div id="boomres"></div>`;
  scr.insertAdjacentHTML('beforeend',html);
  window.__boom=function(i){
    document.querySelectorAll('.boom .opt').forEach((bt,j)=>{bt.disabled=true;
      if(b.opts[j].ok)bt.classList.add('ok');if(j===i&&!b.opts[i].ok)bt.classList.add('no');if(!b.opts[j].ok&&j!==i)bt.classList.add('dim');});
    const o=b.opts[i];const r=document.getElementById('boomres');
    if(o.ok){
      G.mastered[id]=true;G.boomQueue.shift();fxRep(1);
      r.innerHTML=`<div class="res g"><span class="rt">✅ 这次记住了（声望+1）</span>${b.kp||''}</div><button class="btn" onclick="nextCase()">继续 →</button>`;
    }else{
      r.innerHTML=`<div class="res b"><span class="rt">❌ 又错……这点是真没吃透</span>${b.kp||''}</div><button class="btn ghost" onclick="runBoomerang()">↺ 再来一次（答对才放行）</button>`;
    }
  };
}
